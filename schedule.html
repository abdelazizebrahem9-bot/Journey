<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NO MORE CHANCES — SUCCESS OR FAIL FOREVER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#000;--text:#e4e4e7;--muted:#a1a1aa;--muted-2:#71717a;--border:#27272a;--accent:#fbbf24;--card:#050505}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;line-height:1.5}
.container{max-width:1100px;margin:0 auto;padding:32px 20px 80px}
.header{text-align:center;margin-bottom:40px}
.top-title{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
.main-title{font-size:clamp(32px,6vw,52px);font-weight:800;letter-spacing:-.02em;margin-top:8px}
.timer-section{display:flex;flex-direction:column;align-items:center;margin-bottom:36px}
.timer{position:relative;width:260px;height:260px}
.progress-ring{transform:rotate(-90deg);width:260px;height:260px}
.ring-bg{fill:none;stroke:var(--border);stroke-width:8}
.ring-fg{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset.3s}
.timer-display{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
#time{font-size:68px;font-weight:700;font-variant-numeric:tabular-nums}
#mode{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;color:var(--muted-2);margin-top:4px}
.timer-controls{display:flex;gap:10px;margin-top:18px}
.btn{background:var(--accent);color:#000;border:none;padding:10px 18px;border-radius:8px;font-weight:600;cursor:pointer;font-size:14px}
.btn-outline{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.progress-bar{width:100%;max-width:500px;height:6px;background:var(--border);border-radius:3px;margin:20px auto;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);width:0%;transition:width.3s}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px}
.card h3{font-size:15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.task{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-2);font-size:13px}
.task:last-child{border:none}
.task input{width:16px;height:16px;accent-color:var(--accent)}
.task label{flex:1;cursor:pointer}
.badge{font-size:10px;padding:2px 6px;background:#1a1a1f;border-radius:4px;color:var(--muted-2)}
.footer{text-align:center;margin-top:40px;color:var(--muted-2);font-size:12px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="top-title">NO MORE CHANCES</div>
    <div class="main-title">SUCCESS OR FAIL FOREVER</div>
  </div>

  <div class="timer-section">
    <div class="timer">
      <svg class="progress-ring"><circle class="ring-bg" cx="130" cy="130" r="118"/><circle class="ring-fg" cx="130" cy="130" r="118" stroke-dasharray="741" stroke-dashoffset="0"/></svg>
      <div class="timer-display"><div id="time">90:00</div><div id="mode">READY</div></div>
    </div>
    <div class="timer-controls">
      <button class="btn" id="startWork">Start 90min</button>
      <button class="btn-outline" id="startBreak">Start 15min</button>
      <button class="btn-outline" id="reset">Reset</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="dayProgress"></div></div>
  </div>

  <div class="grid" id="blocks"></div>
  <div class="footer">Handling our scheduler. 90 work / 15 break.</div>
</div>

<script>
const blocks=[
 {title:"BLOCK 1 — CODE EMPIRE (06:30-10:30)",tasks:["HTML/CSS freeCodeCamp 90min","BREAK 15","Build King.html 90min","English shadowing 60min"]},
 {title:"BLOCK 2 — LOGIC EMPIRE (10:45-14:45)",tasks:["Python fundamentals 90min","BREAK 15","Lunch 45","Mathematics Khan 90min"]},
 {title:"BLOCK 3 — MONEY EMPIRE (15:00-19:00)",tasks:["Portfolio project 90min","BREAK 15","Clone landing page 90min","Body training 60min"]},
 {title:"BLOCK 4 — ENGLISH & AI (19:30-22:30)",tasks:["Record decree 30min","Tech English 60min","AI tools + Python 90min","Daily review 30min"]}
];
const grid=document.getElementById('blocks');
const today=new Date().toISOString().split('T')[0];
const key='sched-'+today;
let state=JSON.parse(localStorage.getItem(key)||'{}');

function render(){
 grid.innerHTML=blocks.map((b,bi)=>`
  <div class="card"><h3>${b.title}<span class="badge" id="p${bi}">0%</span></h3>
  ${b.tasks.map((t,ti)=>{const id=`${bi}-${ti}`;const c=state[id]?'checked':'';return`<div class="task"><input type="checkbox" id="${id}" ${c} onchange="toggle('${id}')"><label for="${id}">${t}</label></div>`}).join('')}</div>
 `).join('');
 updateProgress();
}
function toggle(id){state[id]=!state[id];localStorage.setItem(key,JSON.stringify(state));updateProgress()}
function updateProgress(){
 const total=document.querySelectorAll('input').length;const done=document.querySelectorAll('input:checked').length;
 document.getElementById('dayProgress').style.width=(done/total*100)+'%';
 blocks.forEach((b,bi)=>{const ts=b.tasks.length;const ds=[...document.querySelectorAll(`input[id^="${bi}-"]`)].filter(i=>i.checked).length;document.getElementById('p'+bi).textContent=Math.round(ds/ts*100)+'%'})
}
render();

// Timer
let timer=null,sec=5400,mode='work',total=5400;
const timeEl=document.getElementById('time'),modeEl=document.getElementById('mode'),ring=document.querySelector('.ring-fg'),circ=2*Math.PI*118;ring.style.strokeDasharray=circ;
function upd(){const m=Math.floor(sec/60).toString().padStart(2,'0'),s=(sec%60).toString().padStart(2,'0');timeEl.textContent=`${m}:${s}`;ring.style.strokeDashoffset=circ*(1-sec/total)}
function tick(){if(sec<=0){clearInterval(timer);new Audio('data:audio/wav;base64,UklGRlQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=').play();if(mode==='work'){start(900,'BREAK')}else{start(5400,'WORK')}return}sec--;upd()}
function start(s,m){clearInterval(timer);sec=s;total=s;mode=m.toLowerCase();modeEl.textContent=m;upd();timer=setInterval(tick,1000)}
document.getElementById('startWork').onclick=()=>start(5400,'WORK');
document.getElementById('startBreak').onclick=()=>start(900,'BREAK');
document.getElementById('reset').onclick=()=>{clearInterval(timer);sec=5400;total=5400;modeEl.textContent='READY';upd()}
upd();
</script>
</body>
</html>
