<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Evidence Locker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#e4e4e7;font-family:Inter,system-ui,sans-serif;padding:20px}
.container{max-width:800px;margin:0 auto}
h1{font-size:28px;margin-bottom:4px}
.subtitle{color:#71717a;font-size:13px;margin-bottom:24px}
.card{background:#18181b;border:1px solid #27272a;border-radius:12px;padding:18px;margin-bottom:16px}
label{display:block;font-size:12px;color:#a1a1aa;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
input,select,textarea{width:100%;background:#09090b;border:1px solid #27272a;color:#e4e4e7;padding:10px;border-radius:8px;font-size:14px;margin-bottom:12px}
textarea{min-height:80px;resize:vertical}
.btn{background:#fbbf24;color:#000;padding:10px 16px;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:14px}
.btn-outline{background:transparent;color:#fbbf24;border:1px solid #fbbf24;padding:8px 12px}
.preview{max-width:100%;max-height:300px;border-radius:8px;margin:10px 0;display:none;border:1px solid #27272a}
.item{background:#0a0a0a;border:1px solid #27272a;border-radius:10px;padding:12px;margin-bottom:10px;display:flex;gap:12px}
.item img{width:80px;height:60px;object-fit:cover;border-radius:6px;flex-shrink:0}
.item-content{flex:1;min-width:0}
.item-date{font-size:11px;color:#71717a}
.item-task{font-size:13px;font-weight:600;color:#fbbf24;margin:2px 0}
.item-note{font-size:12px;color:#d4d4d8;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.actions{display:flex;gap:6px;margin-top:6px}
.back{color:#71717a;text-decoration:none;font-size:13px;margin-bottom:16px;display:inline-block}
</style>
</head>
<body>
<div class="container">
  <a href="King.html" class="back">← Back to Dashboard</a>
  <h1>EVIDENCE LOCKER</h1>
  <div class="subtitle">Insert screenshot + how you solved it</div>

  <div class="card">
    <label>Date</label>
    <input type="date" id="date">
    <label>Task</label>
    <select id="task">
      <option>English</option>
      <option>HTML/CSS</option>
      <option>Python</option>
      <option>Math</option>
      <option>Project</option>
    </select>
    <label>Screenshot</label>
    <input type="file" id="file" accept="image/*">
    <img id="preview" class="preview">
    <label>How I solved this problem</label>
    <textarea id="note" placeholder="What was hard? What did you try? What worked?"></textarea>
    <button class="btn" onclick="save()">💾 Save Evidence</button>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3 style="font-size:15px">Saved Evidence</h3>
      <button class="btn-outline" onclick="exportAll()">Export All</button>
    </div>
    <div id="list"></div>
  </div>
</div>

<script>
const dateEl=document.getElementById('date');
dateEl.valueAsDate=new Date();
const params=new URLSearchParams(location.search);
if(params.get('task')) document.getElementById('task').value=params.get('task');

const fileEl=document.getElementById('file');
const preview=document.getElementById('preview');
let imgData='';
fileEl.onchange=e=>{
  const f=e.target.files[0];
  if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{imgData=ev.target.result;preview.src=imgData;preview.style.display='block';};
  r.readAsDataURL(f);
};

function load(){return JSON.parse(localStorage.getItem('evidence')||'[]')}
function saveAll(d){localStorage.setItem('evidence',JSON.stringify(d))}

function save(){
  const d=dateEl.value, t=document.getElementById('task').value, n=document.getElementById('note').value;
  if(!imgData){alert('Choose screenshot first');return}
  const arr=load();
  arr.unshift({id:Date.now(),date:d,task:t,note:n,img:imgData});
  saveAll(arr);
  document.getElementById('note').value='';fileEl.value='';preview.style.display='none';imgData='';
  render();
}

function render(){
  const list=document.getElementById('list');
  const arr=load();
  if(!arr.length){list.innerHTML='<div style="color:#71717a;font-size:13px">No evidence yet. Add your first screenshot above.</div>';return}
  list.innerHTML=arr.map(it=>`
    <div class="item">
      <img src="${it.img}">
      <div class="item-content">
        <div class="item-date">${it.date}</div>
        <div class="item-task">${it.task}</div>
        <div class="item-note">${it.note||'No notes'}</div>
        <div class="actions">
          <button class="btn-outline" style="font-size:11px;padding:4px 8px" onclick="copyMD(${it.id})">Copy MD</button>
          <button class="btn-outline" style="font-size:11px;padding:4px 8px" onclick="del(${it.id})">Delete</button>
        </div>
      </div>
    </div>
  `).join('');
}

function del(id){saveAll(load().filter(x=>x.id!==id));render()}
function copyMD(id){
  const it=load().find(x=>x.id===id);
  const md=`### ${it.date} - ${it.task}\n\n**How I solved:** ${it.note}\n\n![evidence](evidence-${it.id}.png)`;
  navigator.clipboard.writeText(md);alert('Copied! Paste into GitHub');
}
function exportAll(){
  const data=JSON.stringify(load(),null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='evidence-backup.json';a.click();
}
render();
</script>
</body>
</html>
